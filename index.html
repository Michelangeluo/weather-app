<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天气查询</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="top-nav">
    <div class="nav-left">
      <span class="app-title">天气</span>
      <div class="unit-toggle">
        <button class="unit-btn active" id="unitC" onclick="toggleUnit('C')">°C</button>
        <button class="unit-btn" id="unitF" onclick="toggleUnit('F')">°F</button>
      </div>
    </div>
    <div class="nav-center">
      <span id="navCity" class="nav-city">——</span>
    </div>
    <div class="nav-right">
      <div class="search-wrap">
        <input type="text" id="cityInput" class="city-input" placeholder="搜索城市…" autocomplete="off">
        <button class="search-btn" id="searchBtn">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <circle cx="6" cy="6" r="4.5" stroke="currentColor" stroke-width="1.5"/>
            <path d="M9.5 9.5L13 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="date-bar" id="dateBar"></div>

  <main class="main-content">
    <div class="left-col">
      <div class="glass-card current-card">
        <div class="weather-icon-lg" id="weatherIcon"></div>
        <div class="temp-hero" id="tempDisplay"></div>
        <div class="weather-desc" id="weatherDesc"></div>
        <div class="feels-like" id="feelsLike"></div>
      </div>
      <div class="glass-card stats-grid">
        <div class="stat-cell">
          <span class="stat-icon">💨</span>
          <span class="stat-label">风速</span>
          <span class="stat-value" id="statWind">—</span>
        </div>
        <div class="stat-cell">
          <span class="stat-icon">💧</span>
          <span class="stat-label">湿度</span>
          <span class="stat-value" id="statHumidity">—</span>
        </div>
        <div class="stat-cell">
          <span class="stat-icon">👁</span>
          <span class="stat-label">能见度</span>
          <span class="stat-value" id="statVisibility">—</span>
        </div>
        <div class="stat-cell">
          <span class="stat-icon">🔽</span>
          <span class="stat-label">气压</span>
          <span class="stat-value" id="statPressure">—</span>
        </div>
        <div class="stat-cell">
          <span class="stat-icon">🌤</span>
          <span class="stat-label">UV 指数</span>
          <span class="stat-value" id="statUV">—</span>
        </div>
        <div class="stat-cell">
          <span class="stat-icon">🌡️</span>
          <span class="stat-label">露点</span>
          <span class="stat-value" id="statDew">—</span>
        </div>
      </div>
    </div>

    <div class="right-col">
      <div class="glass-card chart-card">
        <canvas id="hourlyChart"></canvas>
      </div>
      <div class="glass-card hourly-card">
        <div class="hourly-scroll" id="hourlyScroll"></div>
      </div>
    </div>
  </main>

  <div class="overlay hidden" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <div class="error-toast hidden" id="errorToast"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
